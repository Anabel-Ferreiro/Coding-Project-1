<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>💬 User Feedback Form</h1>
        <p>We value your feedback! Please fill out the form below.</p>
      </header>

      <main>
        <form id="feedback-form">
          <!-- Name Field -->
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" />
            <span class="tooltip">Enter your first and last name</span>
            <span class="error-msg" id="name-error">Name is required.</span>
          </div>

          <!-- Email Field -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
            <span class="tooltip">Enter a valid email address</span>
            <span class="error-msg" id="email-error">Email is required.</span>
          </div>

          <!-- Comments Field -->
          <div class="form-group">
            <label for="comments">Comments</label>
            <textarea id="comments" placeholder="Enter your comments..." rows="5"></textarea>
            <span class="tooltip">Share your thoughts with us</span>
            <span class="char-count" id="char-count">0 / 200 characters</span>
            <span class="error-msg" id="comments-error">Comments are required.</span>
          </div>

          <button type="submit" id="submit-btn">Submit Feedback</button>
        </form>

        <!-- Feedback Display -->
        <div id="feedback-display">
          <div class="feedback-header">
           <h2>Submitted Feedback</h2>
           <button id="clear-btn">Clear All</button>
          </div>
</div>

    <script src="cp_1.js"></script>
  </body>
</html>
